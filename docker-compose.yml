services:
  mysql:
    image: mysql:8.0
    container_name: sdu-alumni-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: mpa_platform
      MYSQL_USER: platform
      MYSQL_PASSWORD: platform123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: sdu-alumni-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sdu-alumni-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      GIN_MODE: release
      DB_ENABLED: "true"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: mpa_platform
      DB_USER: platform
      DB_PASSWORD: platform123
      REDIS_ENABLED: "true"
      REDIS_ADDR: redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sdu-alumni-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  mysql_data:
  redis_data:
