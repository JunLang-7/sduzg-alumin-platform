services:
  mysql:
    image: mysql:8.0
    container_name: sdu-alumni-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: sdu_alumni_db
      MYSQL_USER: sdu_alumni
      MYSQL_PASSWORD: sdu_alumni_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: sdu-alumni-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sdu-alumni-api
    restart: unless-stopped
    env_file:
      - path: ./server/.env
        required: false
    environment:
      APP_ENV: production
      GIN_MODE: release
      DB_ENABLED: "true"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: sdu_alumni_db
      DB_USER: sdu_alumni
      DB_PASSWORD: sdu_alumni_password
      DB_PARAMS: "charset=utf8mb4&parseTime=true&loc=Local"
      REDIS_ENABLED: "true"
      REDIS_ADDR: redis:6379
      STORAGE_ENABLED: "true"
      STORAGE_DRIVER: minio
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin123
      STORAGE_BUCKET: sdu-alumni-files
      STORAGE_USE_SSL: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sdu-alumni-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

  minio:
    image: minio/minio:latest
    container_name: sdu-alumni-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
  minio_data:
