services:
  mysql:
    image: mysql:8.0
    container_name: sdu-alumni-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sdu_alumni_db}
      MYSQL_USER: ${MYSQL_USER:-sdu_alumni}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: sdu-alumni-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD:-}\" ]; then redis-cli -a \"$${REDIS_PASSWORD:-}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sdu-alumni-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      GIN_MODE: release
      SERVER_TRUSTED_PROXIES: ${SERVER_TRUSTED_PROXIES:-}
      DB_ENABLED: "true"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-sdu_alumni}
      DB_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      DB_NAME: ${MYSQL_DATABASE:-sdu_alumni_db}
      DB_PARAMS: "charset=utf8mb4&parseTime=true&loc=Local"
      REDIS_ENABLED: "true"
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-false}
      RATE_LIMIT_GLOBAL_RPM: ${RATE_LIMIT_GLOBAL_RPM:-120}
      RATE_LIMIT_AUTH_RPM: ${RATE_LIMIT_AUTH_RPM:-10}
      RATE_LIMIT_VERIFY_CODE_RPM: ${RATE_LIMIT_VERIFY_CODE_RPM:-3}
      RATE_LIMIT_ADMIN_RPM: ${RATE_LIMIT_ADMIN_RPM:-30}
      CORS_ENABLED: ${CORS_ENABLED:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      STORAGE_ENABLED: "true"
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      STORAGE_BUCKET: sdu-alumni-files
      STORAGE_USE_SSL: "false"
      STORAGE_PUBLIC_ENDPOINT: localhost
      SMS_ENABLED: ${SMS_ENABLED:-false}
      SMS_TENCENT_SECRET_ID: ${SMS_TENCENT_SECRET_ID:-}
      SMS_TENCENT_SECRET_KEY: ${SMS_TENCENT_SECRET_KEY:-}
      SMS_TENCENT_REGION: ${SMS_TENCENT_REGION:-ap-beijing}
      SMS_TENCENT_APP_ID: ${SMS_TENCENT_APP_ID:-}
      SMS_TENCENT_SIGN_NAME: ${SMS_TENCENT_SIGN_NAME:-山东大学政管学院}
      SMS_TENCENT_TEMPLATE_ID: ${SMS_TENCENT_TEMPLATE_ID:-}
      SMS_TENCENT_ENDPOINT: ${SMS_TENCENT_ENDPOINT:-sms.tencentcloudapi.com}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-465}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-山东大学政管学院}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-8080}:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sdu-alumni-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_HOST_PORT:-80}:80"

  minio:
    image: minio/minio:latest
    container_name: sdu-alumni-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-setup:
    image: minio/mc:latest
    container_name: sdu-alumni-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        echo 'Configuring MinIO CORS...' &&
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} &&
        mc admin config set myminio api cors_allow_origin='http://localhost:80,http://127.0.0.1:80,http://localhost:5173' &&
        echo 'CORS configured (restart minio container to apply)'
      "

volumes:
  mysql_data:
  redis_data:
  minio_data:
